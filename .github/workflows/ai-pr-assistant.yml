name: AI PR Assistant

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Job 1: Auto-generate PR description when PR is opened (if empty)
  generate-description:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    
    steps:
      - name: Check if PR has description
        id: check_description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const hasDescription = pr.body && pr.body.trim().length > 0;
            core.setOutput('has_description', hasDescription);
            core.setOutput('pr_number', pr.number);
      
      - name: Checkout AI PR Reviewer
        if: steps.check_description.outputs.has_description == 'false'
        uses: actions/checkout@v4
        with:
          repository: 'emil-ep/pr-reviewer'  # Replace with your repo
          path: 'ai-reviewer'
      
      - name: Setup Node.js
        if: steps.check_description.outputs.has_description == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'ai-reviewer/package-lock.json'
      
      - name: Install dependencies
        if: steps.check_description.outputs.has_description == 'false'
        working-directory: ai-reviewer
        run: npm ci
      
      - name: Build project
        if: steps.check_description.outputs.has_description == 'false'
        working-directory: ai-reviewer
        run: npm run build
      
      - name: Generate PR Description
        if: steps.check_description.outputs.has_description == 'false'
        working-directory: ai-reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'chatgpt' }}
          
          # OpenAI (ChatGPT)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          
          # Anthropic (Claude)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          
          # Grok
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ secrets.GROK_MODEL }}
          
          # Bob (Custom)
          BOB_API_ENDPOINT: ${{ secrets.BOB_API_ENDPOINT }}
          
          # Repository info
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ steps.check_description.outputs.pr_number }}
        run: |
          echo "📝 Generating PR description for #${PR_NUMBER}"
          echo "Using AI Provider: ${AI_PROVIDER:-chatgpt}"
          node dist/generate-description.js
      
      - name: Comment on PR (on failure)
        if: failure() && steps.check_description.outputs.has_description == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Failed to auto-generate PR description. Please add a description manually.'
            })

  # Job 2: Review PR when user comments /review
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' && 
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/review')
    
    steps:
      - name: Checkout AI PR Reviewer
        uses: actions/checkout@v4
        with:
          repository: 'emil-ep/pr-reviewer'  # Replace with your repo
          path: 'ai-reviewer'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'ai-reviewer/package-lock.json'
      
      - name: Install dependencies
        working-directory: ai-reviewer
        run: npm ci
      
      - name: Build project
        working-directory: ai-reviewer
        run: npm run build
      
      - name: Run AI PR Review
        working-directory: ai-reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          
          # AI Provider Configuration
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          
          # Bob Configuration
          BOB_API_ENDPOINT: ${{ secrets.BOB_API_ENDPOINT }}
          
          # ChatGPT Configuration
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          
          # Claude Configuration
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          
          # Grok Configuration
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ secrets.GROK_MODEL }}
        run: |
          echo "🤖 Reviewing PR #${PR_NUMBER} in ${REPO_OWNER}/${REPO_NAME}"
          echo "Using AI Provider: ${AI_PROVIDER:-bob}"
          node dist/index.js
